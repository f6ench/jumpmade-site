<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sniper OS - Quick Setup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { green: '#22c55e', dark: '#0a0f1a', card: '#111827' }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-brand-dark min-h-screen flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-md">
        <div class="bg-brand-card border border-gray-800 rounded-2xl p-8 shadow-2xl">
            <div class="text-center mb-8">
                <h1 class="text-2xl font-bold text-white mb-2">Sniper OS Setup</h1>
                <p class="text-gray-400 text-sm">Quick details to get you connected. Takes 30 seconds.</p>
            </div>

            <form id="setupForm" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1">Full name</label>
                    <input type="text" name="name" required
                        class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2.5 text-white placeholder-gray-500 focus:outline-none focus:border-brand-green focus:ring-1 focus:ring-brand-green"
                        placeholder="e.g. Chris Welch">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1">Business name</label>
                    <input type="text" name="business" required
                        class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2.5 text-white placeholder-gray-500 focus:outline-none focus:border-brand-green focus:ring-1 focus:ring-brand-green"
                        placeholder="e.g. KW Pro Plumbing">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1">Checkatrade email</label>
                    <input type="email" name="ct_email" required
                        class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2.5 text-white placeholder-gray-500 focus:outline-none focus:border-brand-green focus:ring-1 focus:ring-brand-green"
                        placeholder="The email you log into Checkatrade with">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1">Checkatrade password</label>
                    <input type="password" name="ct_password" required
                        class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2.5 text-white placeholder-gray-500 focus:outline-none focus:border-brand-green focus:ring-1 focus:ring-brand-green"
                        placeholder="Needed to connect your account">
                    <p class="text-gray-500 text-xs mt-1">Stored securely. Only used to connect your Checkatrade account.</p>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1">Phone number (for lead alerts)</label>
                    <input type="tel" name="phone" required
                        class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2.5 text-white placeholder-gray-500 focus:outline-none focus:border-brand-green focus:ring-1 focus:ring-brand-green"
                        placeholder="07...">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1">Email for app login <span class="text-gray-500">(if different)</span></label>
                    <input type="email" name="app_email"
                        class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2.5 text-white placeholder-gray-500 focus:outline-none focus:border-brand-green focus:ring-1 focus:ring-brand-green"
                        placeholder="Leave blank if same as above">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1">What job management software do you use?</label>
                    <input type="text" name="crm"
                        class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2.5 text-white placeholder-gray-500 focus:outline-none focus:border-brand-green focus:ring-1 focus:ring-brand-green"
                        placeholder="e.g. ServiceM8, Tradify, spreadsheet, none">
                </div>

                <button type="submit" id="submitBtn"
                    class="w-full bg-brand-green hover:bg-green-600 text-black font-semibold py-3 rounded-lg transition-colors mt-2">
                    Submit
                </button>
            </form>

            <div id="success" class="hidden text-center py-8">
                <div class="text-brand-green text-4xl mb-4">&#10003;</div>
                <h2 class="text-xl font-bold text-white mb-2">All set!</h2>
                <p class="text-gray-400">I'll get you connected and you'll start seeing leads come through. I'll text you once it's live.</p>
            </div>
        </div>

        <p class="text-center text-gray-600 text-xs mt-6">Jumpmade</p>
    </div>

    <script>
        document.getElementById('setupForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.textContent = 'Sending...';
            btn.disabled = true;

            const formData = new FormData(this);
            const data = Object.fromEntries(formData.entries());

            // Store locally + copy to clipboard as backup
            const text = Object.entries(data).map(([k, v]) => `${k}: ${v}`).join('\n');

            try {
                // Try Formspree first (set up your form ID at formspree.io)
                const response = await fetch('https://formspree.io/f/YOUR_FORM_ID', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (!response.ok) throw new Error('Formspree not configured');
            } catch (err) {
                // Fallback: copy to clipboard
                try { await navigator.clipboard.writeText(text); } catch(e) {}
            }

            // Always show success + store in localStorage
            const submissions = JSON.parse(localStorage.getItem('sniper_signups') || '[]');
            submissions.push({ ...data, submitted: new Date().toISOString() });
            localStorage.setItem('sniper_signups', JSON.stringify(submissions));

            document.getElementById('setupForm').classList.add('hidden');
            document.getElementById('success').classList.remove('hidden');
        });
    </script>
</body>
</html>
